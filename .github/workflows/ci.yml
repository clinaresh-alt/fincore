# ============================================================
# FinCore - Main CI Pipeline
# ============================================================
#
# Pipeline principal que coordina la ejecucion de CI para
# todo el monorepo: backend, frontend y smart contracts.
#
# Este workflow se ejecuta en cada push/PR y llama a los
# workflows especificos segun los archivos modificados.
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Detectar cambios para ejecutar pipelines selectivamente
  # ============================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      contracts: ${{ steps.filter.outputs.contracts }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            contracts:
              - 'backend/contracts/**'

  # ============================================================
  # Backend CI
  # ============================================================
  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/backend-ci.yml
    secrets: inherit

  # ============================================================
  # Frontend CI
  # ============================================================
  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/frontend-ci.yml
    secrets: inherit

  # ============================================================
  # Status check final
  # ============================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend]
    if: always()

    steps:
      - name: Check CI Results
        run: |
          echo "### CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
            if [ "${{ needs.backend.result }}" == "success" ]; then
              echo "| Backend | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.backend.result }}" == "failure" ]; then
              echo "| Backend | :x: Failed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Backend | :grey_question: ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Backend | :fast_forward: Skipped (no changes) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.changes.outputs.frontend }}" == "true" ]; then
            if [ "${{ needs.frontend.result }}" == "success" ]; then
              echo "| Frontend | :white_check_mark: Passed |" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.frontend.result }}" == "failure" ]; then
              echo "| Frontend | :x: Failed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Frontend | :grey_question: ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Frontend | :fast_forward: Skipped (no changes) |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if any check failed
        if: needs.backend.result == 'failure' || needs.frontend.result == 'failure'
        run: |
          echo "::error::One or more CI checks failed"
          exit 1
