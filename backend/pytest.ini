[pytest]
# Configuracion de pytest para FinCore

# Directorio de tests
testpaths = tests

# Patrones de archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Plugins
# NOTE: Coverage threshold reduced to 40% temporarily.
# Current coverage focuses on services (analytics 100%, notification 79%, risk 78%, etc.)
# To reach 60%+, endpoint integration tests are needed (admin, analytics, audit, etc.)
# TODO: Add endpoint tests with TestClient and database fixtures
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --cov=app
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-fail-under=40

# Marcadores personalizados
markers =
    unit: Unit tests (run with: pytest -m unit)
    integration: Integration tests (run with: pytest -m integration)
    blockchain: Blockchain related tests
    audit: Audit service tests
    slow: Slow tests that may take time
    asyncio: Async tests

# Configuracion de asyncio
asyncio_mode = auto

# Timeout para tests
timeout = 60

# Filtrar warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Variables de entorno para tests
env =
    TESTING=true
    DATABASE_URL=sqlite:///./test.db
